# Pharmiperia Supabase project config
# Docs: https://supabase.com/docs/guides/cli/config

project_id = "pharmiperia-lv-update"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["http://127.0.0.1:3000/auth/callback"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

# Phase 1 task 14: custom SMTP for auth emails (Resend).
# Local dev uses Inbucket (enabled above). For remote Supabase project:
# Dashboard → Authentication → SMTP Settings, or enable below with env vars.
# Resend: host=smtp.resend.com, port=587, user=resend, pass=<RESEND_API_KEY>
[auth.email.smtp]
enabled = false
host = "smtp.resend.com"
port = 587
user = "resend"
pass = "env(RESEND_API_KEY)"
admin_email = "env(AUTH_EMAIL_ADDRESS)"
sender_name = "Pharmiperia"

[auth.email.template.confirmation]
subject = "Apstipriniet savu Pharm.lv e-pasta adresi"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.recovery]
subject = "Pharm.lv paroles atjaunošana"
content_path = "./supabase/templates/recovery.html"

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083
