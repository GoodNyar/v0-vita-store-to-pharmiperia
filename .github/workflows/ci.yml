name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  db-types:
    name: database types drift
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase (migrations only)
        run: supabase start -x studio,imgproxy,logflare,vector,mailpit,inbucket,edge-runtime

      - name: Reset database from migrations
        run: supabase db reset --yes

      - name: Regenerate database types
        run: pnpm db:types

      - name: Fail on schema drift
        run: |
          if git diff --exit-code lib/database.types.ts; then
            echo "✓ lib/database.types.ts matches migrations"
          else
            echo "error: lib/database.types.ts is out of sync — run pnpm db:types locally and commit" >&2
            exit 1
          fi

  quality:
    name: typecheck · lint · build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build
        env:
          # Placeholders for CI — real secrets live in deployment environments only.
          NEXT_PUBLIC_SITE_URL: https://pharm.lv
          STRIPE_SECRET_KEY: sk_test_ci_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci_placeholder
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.ci_placeholder
          SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.ci_service_role_placeholder

      - name: Production validation (Phase 1 gates)
        run: pnpm run validate:production
        env:
          VALIDATE_RUN_BUILD: "false"
          VALIDATE_RUN_TYPECHECK: "false"
          NEXT_PUBLIC_SITE_URL: https://pharm.lv